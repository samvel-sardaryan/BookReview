services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=BookReview;Username=postgres;Password=${POSTGRES_PASSWORD}
      - AppSettings__Token=${JWT_TOKEN}
      - AppSettings__Issuer=MyApp
      - AppSettings__Audience=MyAppUsers
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: always
    user: postgres
    environment:
      - POSTGRES_DB=BookReview
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data: